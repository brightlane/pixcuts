name: Daily SEO Swarm Engine

on:
  schedule:
    - cron: "0 2 * * *"  # runs daily at 2 AM UTC
  workflow_dispatch:     # manual trigger button

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip

      - name: Run SEO Swarm Engine
        run: |
          python seo_swarm_engine.py

      - name: Commit generated pages
        run: |
          git config --global user.name "seo-bot"
          git config --global user.email "seo-bot@users.noreply.github.com"

          git add .
          git commit -m "daily seo swarm update" || echo "No changes"
          git push
